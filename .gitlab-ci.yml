image: "python:3.5"

before_script:
  - apt-get update -qy
  - apt-get install -y python3-dev python3-pip
  - pip install --upgrade pip
  - pip install coverage
  - pip install -r requirements.txt

test:
  script:
  - python -m unittest discover -v -s test

coverage:
  script:
  - coverage run -m unittest discover -s test
