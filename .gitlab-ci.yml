image: "python:3.5"

before_script:
  - apt-get update -qy
  - apt-get install -y python3-dev python3-pip
  - pip install --upgrade pip
  - pip install coverage
  - pip install -r requirements.txt
  - pip install pep8
  - pip install pylint
  - pip install -e .

test:
  script:
  - python -m unittest discover -v -s test

coverage:
  script:
  - coverage run -m unittest discover -s test
  - coverage report -m

job-pep8:
  script:
  - pep8 --filename=*.py --count --exclude=./docs


job-pylint:
  script:
  - pylint pyretis
