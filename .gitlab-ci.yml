.protected: &protected
  - master
  - develop

.coverage_artifact: &coverage_artifacts
  artifacts:
    paths:
      - .coverage*
    expire_in: 1 week

image: python:3.11-buster

.oldpy: &old_py
  image: python:3.8-buster
  stage: old_py

.codacy: &codacy
  after_script:
  - pip install codacy-coverage
  - python-codacy-coverage -r coverage.xml
 

stages:
  - style
  - light_test
  - heavy_test
  - example_test
  - old_py
  - coverage
  - upload
  - do_release

before_script:
  - apt-get update -qy
  - apt-get install gcc -y
  - pip install --upgrade pip
  - pip install -r requirements.txt
  - pip install -e .
  - python -V

pylint:
  stage: style
  script:
  - apt-get install git -y
  - git clone https://github.com/emacsorphanage/pylint.git pylint
  - pip install -r requirements.txt
  - python devtools/run_linting.py --input pyretis --white-list numpy PyQt5 mdtraj
  needs: []

pycodestyle:
  stage: style
  script:
  - pip install pycodestyle
  - pycodestyle
  needs: []

pydocstyle:
  stage: style
  script:
  - pip install pydocstyle
  - pydocstyle --count pyretis
  needs: []

test:
  stage: light_test
  script:
  - pip install coverage
  - coverage run -p -m unittest discover -s test
  <<: *coverage_artifacts
  needs: []

test_pyvisa:
  stage: light_test
  when: manual
  script:
  - pip install -r requirements.txt
  - pip install coverage
  - apt-cache policy gromacs
  - apt-get install -y gromacs
  - gmx --version
  - gmx_d --version
  - cd examples/test/test-pyvisa/
  - ./run-all-pyvisa.sh
  - cd ../../../
  - coverage run -p -m unittest discover -s test/pyvisa
  <<: *coverage_artifacts
  needs: []

test_internal:
  stage: light_test
  script:
  - cd examples/test/test-internal/
  - ./run-all-internal.sh
  needs: []

test_lammps:
  stage: heavy_test
  when: manual
  script:
  - cd examples/test/test-lammps/
  - ./run-all-lammps.sh
  needs: []

test_gromacs:
  stage: heavy_test
  when: manual
  script:
  - apt-cache policy gromacs
  - apt-get install -y gromacs
  - gmx --version
  - gmx_d --version
  - cd examples/test/test-gromacs/
  - ./run-all-gromacs.sh
  needs: []

test_cp2k:
  stage: heavy_test
  when: manual
  script:
  - apt-cache policy cp2k
  - apt-get install -y cp2k
  - cp2k -v
  - cd examples/test/test-cp2k/
  - ./run-all-cp2k.sh
  needs: []

test_openmm:
  image: continuumio/miniconda3:latest
  when: manual
  stage: heavy_test
  before_script:
  - conda install python=3.9
  - apt-get update -qy
  - apt-get install zip gcc -y
  - conda install cmake -y
  script:
  - conda install -c conda-forge openmm libstdcxx-ng -y
  - pip install -r requirements.txt
  - pip install -e .
  - python -V
  - conda list
  - python -m openmm.testInstallation
  - pip install coverage
  - coverage run -p -m unittest discover -s test
  <<: *coverage_artifacts
  needs: []

build_docs:
  stage: style
  script:
  - apt-get install -y texlive-latex-extra dvipng
  - pip install sphinx
  - pip install sphinx_bootstrap_theme
  - cd docs
  - make html
  - cd ../devtools/docs  
  - python check_api_docs.py ../../docs/api/ ../../pyretis
  - cd ../../
  artifacts:
    paths:
      - docs/_build/html
    expire_in: 1 week
  needs: []

test_oldpy:
   extends: test
   when: manual
   <<: *old_py

test_internal_oldpy:   
   extends: test_internal
   when: manual
   <<: *old_py

test_gromacs_oldpy:   
   extends: test_gromacs
   when: manual
   <<: *old_py

test_cp2k_oldpy:   
   extends: test_cp2k
   when: manual
   <<: *old_py

test_min_version:
  extends: test
  when: manual
  <<: *old_py
  before_script: 
    - apt-get update -qy
    - apt-get install -qy libblas-dev liblapack-dev libatlas-base-dev gfortran
    - apt-get install gcc -y
    - pip install --upgrade pip
    - awk '{gsub(">","="); print $0}' requirements.txt  >> min_req.txt
    - grep "numpy" min_req.txt >> numpy.txt
    - grep "cython" min_req.txt >> numpy.txt 
    - pip install -r numpy.txt
    - pip install -r min_req.txt --no-use-pep517
    - pip install -e .
    - python -V
    - pip freeze

.coverage:
  stage: coverage
  needs: ["test_oldpy", "test_pyvisa", "test_openmm", "test"]
  dependencies:
    - test_oldpy
    - test_pyvisa
    - test_openmm
    - test
  before_script: 
  - pip install coverage
  script:
  - coverage combine --append
  - coverage xml -o coverage.xml
  - coverage report -m
  coverage: '/^TOTAL.*\s+(\d+\%)/'

coverage_unprotected:
  extends: .coverage
  except: *protected
 
coverage_protected:
  extends: .coverage
  only: *protected
  <<: *codacy

upload_docs:
   only: 
     - master@pyretis/pyretis
   stage: upload
   dependencies: 
     - build_docs
   before_script:
     - apt-get update -qy
     - apt-get -y install rsync
     - ls docs/_build/html 
   script:
     - echo "$SSHKEY" > sshkey
     - chmod 600 sshkey
     - mkdir -p ~/.ssh
     - ssh-keyscan -t rsa $WEBSITE >> ~/.ssh/known_hosts 2>/dev/null
     - rsync -ua --progress --delete --stats -e "ssh -i sshkey" ./docs/_build/html/* $WEBUSER@$WEBSITE:~/WWW/current/

do_release:
   stage: upload
   dependencies:
     - build_docs
   script:
     - pip install twine
     - echo $CI_COMMIT_TAG
     - diff -u <(python -c "import pyretis; print('v'+format(pyretis.version.VERSION))") <(echo "$CI_COMMIT_TAG")
     - if [ $? -ne 0 ]; then exit 1; fi
     - python setup.py sdist bdist_wheel
     - twine upload --repository-url https://test.pypi.org/legacy/ dist/* -u e114f8b92336dcc9 -p $TWINE_PASSWORD 
     - pip uninstall pyretis -y 
     - pip install --index-url https://test.pypi.org/simple/ pyretis
     - twine upload dist/*
     - apt-get update -qy
     - apt-get -y install rsync
     - ls docs/_build/html
     - echo "$SSHKEY" > sshkey
     - chmod 600 sshkey
     - mkdir -p ~/.ssh
     - ssh-keyscan -t rsa $WEBSITE >> ~/.ssh/known_hosts 2>/dev/null
     - ssh -i sshkey $WEBUSER@$WEBSITE `bash -s` << EOF
     - mkdir ~/WWW/$CI_COMMIT_TAG
     - EOF
     - rsync -ua --progress --delete --stats -e "ssh -i sshkey" ./docs/_build/html/* $WEBUSER@$WEBSITE:~/WWW/$CI_COMMIT_TAG/
